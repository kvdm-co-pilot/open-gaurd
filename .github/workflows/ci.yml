name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: Build + test on Ubuntu (Android/JVM only — iOS targets are OS-gated)
  build-and-test:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # On Ubuntu, iOS targets are automatically skipped by the OS-gating
      # in openguard-core/build.gradle.kts (isMacOs check).
      # Sample app is also excluded by OS-gating in settings.gradle.kts
      # (it requires appcompat/lifecycle-runtime-ktx from dl.google.com).
      # This compiles Android/JVM targets and runs commonTest + androidTest.
      - name: Build (Android/JVM library modules)
        run: ./gradlew build

      - name: Test (Android/JVM + commonTest)
        run: ./gradlew test

      # Lint check
      - name: Lint (detekt)
        run: ./gradlew detekt
        continue-on-error: true

  # Job 2: Full build including iOS on macOS (requires Xcode + iOS Simulator)
  ios-build-and-test:
    runs-on: macos-15
    needs: build-and-test

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # On macOS, the OS-gating enables iOS targets automatically.
      # This compiles all targets including iOS framework linking.
      # The sample app is also included (OS check in settings.gradle.kts passes on Mac).
      - name: Build (all targets including iOS + sample app)
        run: ./gradlew build

      # Run Kotlin/Native iOS unit tests on simulator
      - name: Run iOS unit tests
        run: ./gradlew iosSimulatorArm64Test
        continue-on-error: true

      # Compile the iOS framework for simulator
      - name: Compile iOS framework
        run: ./gradlew linkDebugFrameworkIosSimulatorArm64
        continue-on-error: true

      # Build and test sample iOS app (when sample/iosApp exists — see IOS-010)
      - name: Build and test sample iOS app
        if: hashFiles('sample/iosApp/iosApp.xcodeproj') != ''
        run: |
          cd sample/iosApp
          xcodebuild test \
            -scheme iosApp \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -resultBundlePath TestResults
