name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: Build + test on Ubuntu (Android/JVM compilation, shared tests)
  build-and-test:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # Compiles all targets (including iOS cross-compilation check via Kotlin/Native)
      - name: Build
        run: ./gradlew build

      # Runs JVM + Android unit tests and commonTest shared logic
      - name: Test
        run: ./gradlew test

      # Lint check
      - name: Lint (detekt)
        run: ./gradlew detekt
        continue-on-error: true

  # Job 2: iOS-specific tests on macOS (requires Xcode + iOS Simulator)
  ios-test:
    runs-on: macos-15
    needs: build-and-test

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # Compile the iOS framework for simulator
      # Note: Exact Gradle task name depends on OPS-001 configuration.
      # linkDebugFrameworkIosSimulatorArm64 is the standard KMP task name.
      - name: Compile iOS framework
        run: ./gradlew linkDebugFrameworkIosSimulatorArm64
        continue-on-error: true

      # Run Kotlin/Native iOS unit tests on simulator
      # Note: Requires OPS-001 to configure iOS targets in build.gradle.kts
      - name: Run iOS unit tests
        run: ./gradlew iosSimulatorArm64Test
        continue-on-error: true

      # Build and test sample iOS app (when sample/iosApp exists — see IOS-010)
      - name: Build and test sample iOS app
        if: hashFiles('sample/iosApp/iosApp.xcodeproj') != ''
        run: |
          cd sample/iosApp
          xcodebuild test \
            -scheme iosApp \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -resultBundlePath TestResults
