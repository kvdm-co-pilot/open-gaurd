name: "Copilot Setup Steps"

# ─────────────────────────────────────────────────────────────────────
# CRITICAL: This workflow runs BEFORE the Copilot cloud agent firewall
# activates. The firewall blocks dl.google.com (where Google's Maven
# repo hosts AGP, AndroidX, etc.). All Gradle dependencies MUST be
# resolved here so they're cached in ~/.gradle/caches when the agent
# runs builds later.
#
# See: https://docs.github.com/en/copilot/customizing-copilot/
#      customizing-the-development-environment-for-copilot-coding-agent
# ─────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- JDK (required for Gradle, Android SDK, and Appium) ---
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # --- Node.js (required for Appium and MCP servers) ---
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # --- Appium + drivers (additional layer on the emulator already set up above) ---
      - name: Install Appium and drivers
        run: |
          npm install -g appium
          appium driver install uiautomator2
          appium --version

      # --- Appium MCP servers (gives Copilot direct access to the emulator via MCP tools) ---
      # These are layered on top of the emulator — just run `appium &` and the MCP
      # tools connect to it automatically. Two options pre-installed:
      #   1. @wdio/mcp — WebDriverIO MCP (browser + mobile, unified) — recommended
      #   2. mcp-appium-visual — Appium-native MCP with visual element detection
      - name: Install Appium MCP servers
        run: |
          npm install -g @wdio/mcp
          npm install -g mcp-appium-visual

      # --- Android SDK & emulator ---
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android system image and create AVD
        run: |
          yes | sdkmanager "system-images;android-34;google_apis;x86_64" "emulator" "platform-tools" || true
          echo "no" | avdmanager create avd -n openguard_test -k "system-images;android-34;google_apis;x86_64" --force

      # --- Gradle dependencies (pre-cache for faster builds) ---
      # IMPORTANT: This step runs with FULL internet access (before firewall).
      # It must resolve ALL dependencies that `./gradlew build` and
      # `./gradlew test` will need, because once the agent starts,
      # dl.google.com will be DNS-blocked by the sandbox firewall.
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Pre-cache ALL Gradle dependencies (before firewall activates)
        run: |
          chmod +x gradlew

          # 1. Resolve build script / plugin dependencies (AGP, Kotlin plugin, etc.)
          #    This downloads com.android.library, kotlin.multiplatform from dl.google.com
          ./gradlew buildEnvironment --no-daemon

          # 2. Resolve all module dependency metadata (POMs, module files)
          #    Include sample app so its deps (appcompat, lifecycle-runtime-ktx, etc.) are cached
          ./gradlew \
            :openguard-core:dependencies \
            :openguard-android:dependencies \
            --no-daemon

          # 3. Full build of the library modules — this downloads ALL compile JARs/AARs
          #    (coroutines, okhttp, androidx annotation, core, biometric, security-crypto, etc.)
          #    Must succeed here (full internet access) so JARs are in cache before firewall.
          ./gradlew :openguard-core:build :openguard-android:build --no-daemon

          # 4. Also resolve sample app deps while we have internet access
          #    Pass -PincludeSampleApp=true to override the OS-gating in settings.gradle.kts
          ./gradlew -PincludeSampleApp=true \
            :sample:androidApp:dependencies \
            :sample:androidApp:compileDebugKotlin \
            --no-daemon || true

          # 5. Warm up the Kotlin/Android compiler daemon
          ./gradlew :openguard-core:compileCommonMainKotlinMetadata --no-daemon || true
